name: Code Quality & CI

# Trigger this workflow on every push or pull request to the main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    # 1. Check out the latest code from the repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up a clean Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automatically caches dependencies for faster subsequent runs

    # 3. Install core dependencies + formatting/linting tools
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install black ruff pytest
        if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

    # 4. Verify code is perfectly formatted
    - name: Check Formatting (Black)
      run: python -m black --check .

    # 5. Verify there are no linting bugs or unhandled errors
    - name: Lint Code (Ruff)
      run: python -m ruff check .

    # 6. Run test suite (will execute based on pyproject.toml paths)
    - name: Run Tests (Pytest)
      run: python -m pytest